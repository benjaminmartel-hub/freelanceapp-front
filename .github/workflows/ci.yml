name: Frontend CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    name: Build frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests if configured
        run: |
          if node -e "const scripts = require('./package.json').scripts || {}; process.exit(scripts['test:ci'] ? 0 : 1)"; then
            npm run test:ci
          else
            echo "No test:ci script configured; skipping tests."
          fi
