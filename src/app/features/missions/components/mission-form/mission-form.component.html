<form [formGroup]="form" class="mission-form" (ngSubmit)="onSubmit()">
  <div class="mission-form__grid">
    <div class="mission-form__field">
      <label for="title">Titre mission</label>
      <input id="title" pInputText formControlName="title" placeholder="Refonte e-commerce" />
      <small *ngIf="form.controls.title.invalid && form.controls.title.touched" class="mission-form__error">
        Le titre est obligatoire.
      </small>
    </div>

    <div class="mission-form__field">
      <label for="clientName">Client</label>
      <input id="clientName" pInputText formControlName="clientName" placeholder="Acme Studio" />
      <small
        *ngIf="form.controls.clientName.invalid && form.controls.clientName.touched"
        class="mission-form__error"
      >
        Le client est obligatoire.
      </small>
    </div>

    <div class="mission-form__field">
      <label for="clientContactEmail">Email client</label>
      <input
        id="clientContactEmail"
        pInputText
        type="email"
        formControlName="clientContactEmail"
        placeholder="contact@client.com"
      />
    </div>

    <div class="mission-form__field">
      <label for="dailyRate">Taux journalier</label>
      <p-inputNumber
        id="dailyRate"
        formControlName="dailyRate"
        mode="currency"
        currency="EUR"
        locale="fr-FR"
      ></p-inputNumber>
    </div>

    <div class="mission-form__field">
      <label for="expectedDuration">Duree (jours)</label>
      <p-inputNumber id="expectedDuration" formControlName="expectedDuration"></p-inputNumber>
    </div>

    <div class="mission-form__field">
      <label for="billingType">Mode de facturation</label>
      <p-select
        id="billingType"
        [options]="billingTypeOptions"
        optionLabel="label"
        optionValue="value"
        formControlName="billingType"
      ></p-select>
    </div>

    <div class="mission-form__field">
      <label for="status">Statut</label>
      <p-select
        id="status"
        [options]="statusOptions"
        optionLabel="label"
        optionValue="value"
        formControlName="status"
      ></p-select>
    </div>

    <div class="mission-form__field">
      <label for="startDate">Debut</label>
      <p-datepicker
        id="startDate"
        formControlName="startDate"
        [showIcon]="true"
        dateFormat="dd/mm/yy"
      ></p-datepicker>
    </div>

    <div class="mission-form__field">
      <label for="endDate">Fin</label>
      <p-datepicker
        id="endDate"
        formControlName="endDate"
        [showIcon]="true"
        dateFormat="dd/mm/yy"
      ></p-datepicker>
    </div>

    <div class="mission-form__field">
      <label>Budget estime</label>
      <div class="mission-form__readonly">
        {{ totalBudgetEstimate() | number: '1.0-0' }} &euro;
      </div>
    </div>

    <div class="mission-form__field mission-form__field--full">
      <label for="internalNotes">Notes internes</label>
      <textarea
        id="internalNotes"
        pInputTextarea
        formControlName="internalNotes"
        rows="4"
        placeholder="Points de suivi, risques, attentes..."
      ></textarea>
    </div>
  </div>

  <div class="mission-form__actions">
    <button pButton type="button" label="Annuler" class="p-button-text" (click)="cancel.emit()"></button>
    <button pButton type="submit" [label]="submitLabel()" [loading]="isSaving()"></button>
  </div>
</form>
